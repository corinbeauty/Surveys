<!DOCTYPE html>
<html lang="zh-Hant">

    <title>服務意見調查表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .lang-btn { transition: all 0.2s ease; background-color: white; color: #4b5563; border: 1px solid #e5e7eb; }
        .lang-btn.active { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .question-card { border-radius: 1.5rem; border: 1px solid #f3f4f6; transition: border 0.3s; }
        .modal-show { opacity: 1; pointer-events: auto; transform: scale(1); }
        .modal-hide { opacity: 0; pointer-events: none; transform: scale(0.95); }
        #successModal, #errorModal { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        input:checked + span { color: #2563eb; font-weight: 900; }
        #errorOverlay { backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

<!-- 錯誤阻擋層 (網址錯誤用) -->
<div id="errorOverlay" class="fixed inset-0 z-[200] bg-white/95 flex flex-col items-center justify-center p-10 text-center hidden">

    <h2 class="text-2xl font-black text-slate-800 mb-2">連結已失效或不正確</h2>
    <p class="text-slate-500">請確認您掃描的是門市現場正確的 QR Code</p>
</div>

<div id="app" class="max-w-md mx-auto">
    <header class="bg-white sticky top-0 z-20 shadow-sm px-4 py-4 mb-4 text-center">
        <h1 class="text-xl font-black text-gray-800" data-i18n="title">服務意見調查表</h1>
        <p id="conn-status" class="text-[9px] text-gray-300 font-mono tracking-tighter uppercase mt-1">System Initializing...</p>
        
        <div class="flex justify-between gap-1 bg-gray-100 p-1 rounded-2xl border border-gray-200 mt-4">
            <button onclick="window.changeLang('zh')" id="btn-zh" class="lang-btn active flex-1 py-2.5 rounded-xl text-xs font-bold">中文</button>
            <button onclick="window.changeLang('en')" id="btn-en" class="lang-btn flex-1 py-2.5 rounded-xl text-xs font-bold">EN</button>
            <button onclick="window.changeLang('ja')" id="btn-ja" class="lang-btn flex-1 py-2.5 rounded-xl text-xs font-bold">日本語</button>
            <button onclick="window.changeLang('ko')" id="btn-ko" class="lang-btn flex-1 py-2.5 rounded-xl text-xs font-bold">한국어</button>
        </div>
    </header>

    <main class="px-4 space-y-4">
        <form id="surveyForm" class="space-y-4">
            <div class="bg-white p-6 rounded-3xl border border-blue-100 shadow-sm">
                <label class="block text-[10px] font-bold text-blue-400 mb-1 uppercase tracking-tighter" data-i18n="branchLabel">服務分店</label>
                <div class="flex items-center text-gray-800 font-black text-xl italic">📍 <span id="storeNameText">---</span></div>
            </div>

            <!-- 動態題目區 -->
            <div id="dynamicQuestions" class="space-y-4"></div>

            <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm space-y-5">
                <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b pb-2 mb-2" data-i18n="guestInfo">貴賓資料 Information</h3>
                
                <div id="masseurSection">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase" data-i18n="masseurIdLabel">師傅號碼 *</label>
                    <input type="number" id="masseurId" data-ph="ph_masseur" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label id="labelCustName" class="block text-xs font-bold text-gray-400 mb-2 uppercase" data-i18n="custNameLabel">姓名</label>
                    <input type="text" id="custName" data-ph="ph_name" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label id="labelCustPhone" class="block text-xs font-bold text-gray-400 mb-2 uppercase" data-i18n="phoneLabel">電話</label>
                    <input type="tel" id="custPhone" data-ph="ph_phone" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase" data-i18n="suggestLabel">建議內容詳述</label>
                    <textarea id="suggestions" rows="3" data-ph="ph_suggest" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>

            <button type="submit" id="submitBtn" disabled class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all text-lg opacity-50">
                <span data-i18n="submitBtn">提交問卷 Submit</span>
            </button>
        </form>
    </main>

    <!-- 成功彈窗 -->
    <div id="successModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md modal-hide">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl text-center border-b-8 border-amber-400">
            <div class="bg-blue-600 py-10 text-white">
                <div class="mb-4 flex justify-center">
                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center p-2 shadow-lg">
                        <img src="https://cdn-icons-png.flaticon.com/512/1160/1160358.png" alt="Success" class="w-full h-full object-contain">
                    </div>
                </div>
                <h3 class="text-2xl font-black italic" data-i18n="modalTitle">感謝回饋</h3>
            </div>
            <div class="p-8 space-y-6">
                <p id="modalText" class="text-gray-600 font-bold text-sm leading-relaxed" data-i18n="modalText">我們已收到您的寶貴意見。</p>
                <div class="space-y-3">
                    <button onclick="handleMarketing('Reviewed')" class="bg-amber-400 text-slate-900 block w-full font-black py-4 rounded-2xl shadow-lg text-lg flex items-center justify-center gap-2">
                        <span>⭐</span> <span data-i18n="modalGoGoogle">馬上評論</span>
                    </button>
                    <button onclick="handleMarketing('Dismissed')" class="bg-slate-100 text-slate-400 block w-full font-bold py-3 rounded-2xl text-sm" data-i18n="modalClose">下次再評</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 錯誤彈窗 (維修圖示) -->
    <div id="errorModal" class="fixed inset-0 z-[150] flex items-center justify-center p-6 bg-slate-900/80 backdrop-blur-md modal-hide">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl text-center border-b-8 border-red-500">
            <div class="bg-slate-800 py-10 text-white">

                    <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center p-3 shadow-lg">
                        <img src="https://cdn-icons-png.flaticon.com/512/1004/1004739.png" alt="Maintenance" class="w-full h-full object-contain">
                    </div>
                </div>
                <h3 class="text-2xl font-black italic" data-i18n="errorModalTitle">系統維護中</h3>
            </div>
            <div class="p-8 space-y-6">

            age: "연령대", age1: "20세 이하", age2: "21-30세", age3: "31-40세", age4: "41-50세", age5: "51세 이상",
            src: "어떻게 알고 오셨나요?", src1: "인터넷 광고", src2: "SNS", src3: "지인 추천", src4: "포스터", src5: "브랜드 소개", src6: "방문",
            svc: "체험 항목 (중복 선택 가능)", svc1: "페이셜 보습", svc2: "페이셜 버블", svc3: "아로마 오일", svc4: "핫스톤", svc5: "바디 스크럽", svc6: "이어 캔들", svc9: "두피 케어", svc15: "암반욕", svc16: "SPA",
            sat_svc: "시설/시술 만족도", sat_book: "예약 만족도", sat_env: "환경 만족도", sat_intro: "직원 안내", sat_att: "관리사 태도", sat_pro: "전문성", sat_relax: "편안함", sat_total: "종합 만족도",
            rec: "추천 의향", rev: "재방문 의향", frm: "방문 지역", f_n: "북부", f_c: "중부", f_s: "남부", f_e: "동부",
            rm: "객실 타입", rm1: "싱글 베드", rm2: "디럭스 싱글", rm3: "개인실", rm4: "더블룸", rm5: "포베드룸",
            q1: "번호 안내가 있었나요?", q1_1: "적극 안내", q1_2: "나중에", q1_3: "없음",
            q2: "압력 확인이 있었나요?", q2_1: "적극 확인", q2_2: "수동적", q2_3: "없음",
            q3: "불쾌한 냄새가 있었나요?", q3_1: "전혀 없음", q3_2: "약간 있음", q3_3: "심함",
            q10: "다시 지명하시겠습니까?", q10_1: "꼭 지명", q10_2: "생각 중", q10_3: "안 함"
        }
    };

    let activeSid = null;
    let activeLang = 'zh';

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        activeSid = urlParams.get('sid');
        
        if (!activeSid || !STORE_MAP[activeSid]) {
            document.getElementById('errorOverlay').classList.remove('hidden');
            return;
        }

        const config = STORE_MAP[activeSid];
        const isSpecial = (activeSid === 'SID-PS-8892' || activeSid === 'SID-JS-3310');
        const nameInput = document.getElementById('custName');
        const phoneInput = document.getElementById('custPhone');
        
        // 針對特殊門市強制姓名電話，其餘選填
        if (isSpecial) {
            nameInput.setAttribute('required', 'true');
            phoneInput.setAttribute('required', 'true');
        } else {
            nameInput.removeAttribute('required');
            phoneInput.removeAttribute('required');
        }

        document.getElementById('storeNameText').innerText = config.name;
        renderQuestions();
        window.changeLang('zh');
    }

    function renderQuestions() {
        const container = document.getElementById('dynamicQuestions');
        container.innerHTML = '';
        const config = STORE_MAP[activeSid];
        let qList = [];

        if (config.type === 'standard') {
            document.getElementById('masseurSection').style.display = 'block';
            document.getElementById('masseurId').setAttribute('required', 'true');
            for(let i=1; i<=10; i++) {
                if([1,2,3,10].includes(i)) {
                    qList.push({ id: `q${i}`, type: 'radio', options: [`q${i}_1`, `q${i}_2`, `q${i}_3`] });
                } else {
                    qList.push({ id: `sat_${i}`, labelKey: i==4?'sat_svc':i==5?'sat_att':i==6?'sat_pro':i==7?'sat_relax':i==8?'sat_book':'sat_total', type: 'radio', options: ['vs', 's', 'o', 'u', 'vu'] });
                }
            }
        } else {
            document.getElementById('masseurSection').style.display = 'none';
            document.getElementById('masseurId').removeAttribute('required');
            if (config.type === 'pasha') {
                qList = [
                    { id: 'age', type: 'radio', options: ['age1','age2','age3','age4','age5'] },
                    { id: 'src', type: 'radio', options: ['src1','src2','src3','src4','src5','src6'] },
                    { id: 'svc', type: 'checkbox', options: ['svc1','svc2','svc3','svc4','svc5','svc6','svc9','svc15','svc16'] },
                    { id: 'sat_svc', type: 'radio', options: ['vs','s','o','u','vu'] },
                    { id: 'sat_total', type: 'radio', options: ['vs','s','o','u','vu'] },
                    { id: 'rec', type: 'radio', options: ['y','n'] },
                    { id: 'rev', type: 'radio', options: ['y','n'] }
                ];
            } else if (config.type === 'jing') {
                qList = [
                    { id: 'age', type: 'radio', options: ['age1','age2','age3','age4','age5'] },
                    { id: 'frm', type: 'radio', options: ['f_n','f_c','f_s','f_e'] },
                    { id: 'src', type: 'radio', options: ['src1','src2','src3','src4','src5','src6'] },
                    { id: 'rm', type: 'radio', options: ['rm1','rm2','rm3','rm4','rm5'] },
                    { id: 'sat_total', type: 'radio', options: ['vs','s','o','u','vu'] },
                    { id: 'rec', type: 'radio', options: ['y','n'] },
                    { id: 'rev', type: 'radio', options: ['y','n'] }
                ];
            }
        }

        qList.forEach((q, i) => {
            const html = `
                <div class="bg-white p-6 question-card shadow-sm border border-gray-100">
                    <p class="font-black text-gray-800 mb-4 text-base leading-snug">
                        <span class="text-blue-500 mr-1">${i+1}.</span> <span data-i18n="${q.labelKey || q.id}">...</span>
                    </p>
                    <div class="grid grid-cols-1 gap-2.5">
                        ${q.options.map(opt => `
                            <label class="flex items-center p-4 border rounded-2xl border-gray-100 bg-gray-50/50 active:bg-blue-50 transition cursor-pointer">
                                <input type="${q.type}" name="${q.id}" value="${opt}" class="w-5 h-5 mr-3 text-blue-600" ${q.type==='radio'?'required':''}> 
                                <span class="text-slate-600 text-sm font-bold" data-i18n="${opt}">...</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    window.changeLang = function(lang) {
        activeLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        const d = dicts[lang] || dicts['zh'];
        
        const isSpecial = (activeSid === 'SID-PS-8892' || activeSid === 'SID-JS-3310');
        
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            let text = d[k] || dicts['zh'][k] || k;
            
            // 特殊店面加上必填星號
            if (isSpecial) {
                if (k === 'custNameLabel' || k === 'phoneLabel') text += ' *';
            }
            el.innerHTML = text;
        });

        document.querySelectorAll('[data-ph]').forEach(el => {
            const k = el.getAttribute('data-ph');
            if (d[k]) el.placeholder = d[k];
        });
    };

    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        const payload = {
            sid: activeSid,
            store: STORE_MAP[activeSid].name,
            customer: document.getElementById('custName').value || "Anonymous",
            phone: document.getElementById('custPhone').value || "N/A",
            suggestions: document.getElementById('suggestions').value,
            masseurId: document.getElementById('masseurId').value || "N/A",
            lang: activeLang,
            data: {},
            timestamp: serverTimestamp()
        };

        // 收集題目結果
        document.querySelectorAll('#dynamicQuestions .question-card').forEach(card => {
            const inputs = card.querySelectorAll('input');
            if (inputs.length > 0) {
                const name = inputs[0].name;
                const type = inputs[0].type;
                if (type === 'checkbox') {
                    payload.data[name] = Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(i => i.value);
                } else {
                    const sel = document.querySelector(`input[name="${name}"]:checked`);
                    payload.data[name] = sel ? sel.value : null;
                }
            }
        });

        try {
            // 精準路徑：apps/zhongqing-v1/stores/{sid}/submissions
            const submissionsRef = collection(db, 'apps', 'zhongqing-v1', 'stores', activeSid, 'submissions');
            await addDoc(submissionsRef, payload);
            
            // 紀錄分析
            logEvent(analytics, 'survey_submitted', {
                store_id: activeSid,
                store_name: STORE_MAP[activeSid].name,
                language: activeLang
            });

            document.getElementById('successModal').classList.replace('modal-hide', 'modal-show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
            console.error("Firebase Submission Error:", err);
            document.getElementById('errorModal').classList.replace('modal-hide', 'modal-show');
        } finally {
            btn.disabled = false;
            btn.innerText = (dicts[activeLang] || dicts['zh']).submitBtn;
        }
    });

    window.handleMarketing = (act) => {
        if (act === 'Reviewed') {
            const storeUrl = STORE_MAP[activeSid]?.google || 'https://maps.app.goo.gl/1Rto7b5TRNNF35yf8';
            window.open(storeUrl, '_blank');
        }
        closeModal('successModal');
    };

    window.closeModal = (id) => {
        document.getElementById(id).classList.replace('modal-show', 'modal-hide');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').classList.remove('opacity-50');
            document.getElementById('conn-status').innerText = "Security Verified - Ready to Submit";
        } else {
            document.getElementById('conn-status').innerText = "Authenticating Session...";
        }
    });

    window.onload = () => { init(); signInAnonymously(auth); };
</script>
</body>
</html>
