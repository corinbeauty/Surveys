    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .lang-btn { transition: all 0.2s ease; background-color: white; color: #4b5563; border: 1px solid #e5e7eb; }
        .lang-btn.active { background-color: #2563eb !important; color: white !important; border-color: #1e40af !important; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); }
        .question-card { border-radius: 1.5rem; border: 1px solid #f3f4f6; transition: border 0.3s; }
        .modal-show { opacity: 1; pointer-events: auto; transform: scale(1); }
        .modal-hide { opacity: 0; pointer-events: none; transform: scale(0.95); }
        #successModal, #errorModal { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        input:checked + span { color: #2563eb; font-weight: 900; }
        #errorOverlay { backdrop-filter: blur(12px); }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>

            <!-- 動態題目區 -->

                <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b pb-2 mb-2" data-i18n="guestInfo">貴賓資料 Information</h3>
                
                <div id="masseurSection">
                    <label class="block text-xs font-bold text-gray-400 mb-2 uppercase" data-i18n="masseurIdLabel">師傅號碼 *</label>
                    <input type="number" id="masseurId" data-ph="ph_masseur" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl text-xl font-bold outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>

                    <input type="text" id="custName" data-ph="ph_name" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                </div>

                </div>

    function init() {
        const params = new URLSearchParams(window.location.search);
        activeSid = params.get('sid');
        
        if (!activeSid || !STORE_MAP[activeSid]) {
            document.getElementById('errorOverlay').classList.remove('hidden');
            return;
        }

        document.getElementById('storeNameText').innerText = STORE_MAP[activeSid].name;
        renderQuestions();
        
        // 帕夏、婧仕女 姓名電話必填
        const isSpecial = (activeSid === 'SID-PS-8892' || activeSid === 'SID-JS-3310');
        if (isSpecial) {
            document.getElementById('custName').setAttribute('required', 'true');
            document.getElementById('custPhone').setAttribute('required', 'true');
        } else {
            document.getElementById('custName').removeAttribute('required');
            document.getElementById('custPhone').removeAttribute('required');
        }

        window.changeLang('zh');
    }

            ];
        } else if (config.type === 'pasha') {
            document.getElementById('masseurSection').style.display = 'none';
            document.getElementById('masseurId').removeAttribute('required');
            qList = [
                { id: 'age', type: 'radio', options: ['age1','age2','age3','age4','age5'] },
                { id: 'src', type: 'radio', options: ['src1','src2','src3','src4','src5','src6'] },
                { id: 'svc', type: 'checkbox', options: ['svc1','svc2','svc3','svc4','svc5','svc6','svc9','svc15','svc16'] },
                { id: 'rev', type: 'radio', options: ['y','n'] },
                { id: 'sat_svc', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_book', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_env', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_intro', type: 'radio', options: ['cl','s','o','unl'] },
                { id: 'sat_att', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_pro', type: 'radio', options: ['vs','o','vu'] },
                { id: 'sat_relax', type: 'radio', options: ['vs','o','vu'] },
                { id: 'sat_total', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'rec', type: 'radio', options: ['y','n'] }
            ];
        } else if (config.type === 'jing') {
            document.getElementById('masseurSection').style.display = 'none';
            document.getElementById('masseurId').removeAttribute('required');
            qList = [
                { id: 'age', type: 'radio', options: ['age1','age2','age3','age4','age5'] },
                { id: 'frm', type: 'radio', options: ['f_n','f_c','f_s','f_e'] },
                { id: 'src', type: 'radio', options: ['src1','src2','src3','src4','src5','src6'] },
                { id: 'rm', type: 'radio', options: ['rm1','rm2','rm3','rm4','rm5'] },
                { id: 'rev', type: 'radio', options: ['y','n'] },
                { id: 'sat_book', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_rm', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_env', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_intro', type: 'radio', options: ['cl','s','o','unl'] },
                { id: 'sat_spa', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'sat_total', type: 'radio', options: ['vs','s','o','u','vu'] },
                { id: 'rec', type: 'radio', options: ['y','n'] }
            ];
        }

        qList.forEach((q, idx) => {
            const card = `
                <div class="bg-white p-6 question-card shadow-sm border border-gray-100">
                    <p class="font-black text-gray-800 mb-4 text-base leading-snug">
                        <span class="text-blue-500 mr-1">${idx + 1}.</span> <span data-i18n="${q.id}">---</span>
                    </p>
                    <div class="grid grid-cols-1 gap-2.5">
                        ${q.options.map(opt => `
                            <label class="flex items-center p-4 border rounded-2xl border-gray-100 bg-gray-50/50 active:bg-blue-50 transition cursor-pointer">
                                <input type="${q.type}" name="${q.id}" value="${opt}" class="w-5 h-5 mr-3 text-blue-600" ${q.type==='radio'?'required':''}> 
                                <span class="text-slate-600 text-sm font-bold" data-i18n="${opt}">---</span>
                            </label>`).join('')}
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', card);
        });
    }

    // --- STREAMING_CHUNK:Handling language change and data translations... ---
    window.changeLang = function(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        const d = dicts[lang] || dicts['zh'];

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const k = el.getAttribute('data-i18n');
            if (d[k]) el.innerHTML = d[k];
            else if (dicts['zh'][k]) el.innerHTML = dicts['zh'][k];
        });

        document.querySelectorAll('[data-ph]').forEach(el => {
            const k = el.getAttribute('data-ph');
            if (d[k]) el.placeholder = d[k];
        });

        const isSpec = (activeSid === 'SID-PS-8892' || activeSid === 'SID-JS-3310');
        document.getElementById('labelCustName').innerHTML = d['custNameLabel'] + (isSpec ? ' *' : '');
        document.getElementById('labelCustPhone').innerHTML = d['phoneLabel'] + (isSpec ? ' *' : '');
    };

    // --- STREAMING_CHUNK:Processing form submission and Firebase storage... ---
    document.getElementById('surveyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        const results = {
            sid: activeSid,
            store: STORE_MAP[activeSid].name,
            masseurId: document.getElementById('masseurId').value || "N/A",
            customerName: document.getElementById('custName').value,
            customerPhone: document.getElementById('custPhone').value,
            suggestions: document.getElementById('suggestions').value,
            lang: currentLang,
            data: {},
            timestamp: serverTimestamp()
        };

        document.querySelectorAll('#dynamicQuestions .question-card').forEach(card => {
            const input = card.querySelector('input');
            const name = input.name;
            if (input.type === 'checkbox') {
                results.data[name] = Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(i => i.value);
            } else {
                const sel = document.querySelector(`input[name="${name}"]:checked`);
                results.data[name] = sel ? sel.value : null;
            }
        });

        try {
            // 注意：路徑為 apps -> zhongqing-v1 -> stores -> sid -> submissions
            await addDoc(collection(db, 'apps', 'zhongqing-v1', 'stores', activeSid, 'submissions'), results);
            logEvent(analytics, 'survey_submitted', { store: results.store });
            document.getElementById('successModal').classList.replace('modal-hide', 'modal-show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (err) {
            console.error("Firebase Submission Error:", err);
            document.getElementById('errorModal').classList.replace('modal-hide', 'modal-show');
        } finally {
            btn.disabled = false;
            btn.innerText = dicts[currentLang].submitBtn;
        }
    });

    window.handleMarketing = (act) => {
        if (act === 'Reviewed') window.open(STORE_MAP[activeSid].google, '_blank');
        document.getElementById('successModal').classList.replace('modal-show', 'modal-hide');
    };

    // --- STREAMING_CHUNK:Managing Auth status and startup... ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').classList.remove('opacity-50');
            document.getElementById('conn-status').innerText = "SECURE CLOUD READY";
        }
    });

    window.onload = async () => { 
        init(); 
        try {
            await signInAnonymously(auth);
        } catch(e) {
            console.error("Auth Failed", e);
            // 如果驗證失敗，直接彈出維修視窗
            document.getElementById('errorModal').classList.replace('modal-hide', 'modal-show');
        }
    };
</script>
</body>
</html>
